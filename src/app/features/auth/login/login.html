<!-- login.html -->
<div class="auth-layout">

  <div class="auth-left">
    <div class="auth-left__overlay"></div>
    <div class="auth-left__content">
      <a routerLink="/" class="auth-left__logo">
        <span class="logo-icon">T</span>
        <span class="logo-word">turnio</span>
      </a>
      <div class="auth-left__quote">
        <p>"Antes perdía media hora por día en mensajes.<br>Ahora los clientes reservan solos."</p>
        <span>— Kevin R., The Fade Barbershop</span>
      </div>
    </div>
    <div class="auth-left__pattern"></div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap" [class.form-exit]="isExiting()">

      <div class="auth-form__header">
        <p class="auth-form__eyebrow">Bienvenido de vuelta</p>
        <h1 class="auth-form__title">Ingresá a tu panel</h1>
      </div>

      @if (error()) {
        <div class="auth-error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error() }}
        </div>
      }

      <form class="auth-form" (ngSubmit)="onLogin()">

        <div class="field">
          <label class="field__label" for="login-email">Email</label>
          <input
            id="login-email"
            class="field__input"
            type="email"
            placeholder="tu@email.com"
            [(ngModel)]="email"
            name="email"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <div class="field__label-row">
            <label class="field__label" for="login-password">Contraseña</label>
            <a routerLink="/recuperar-contrasena" class="field__forgot">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="field__input-wrap">
            <input
              id="login-password"
              class="field__input"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              class="field__toggle"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword()) {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading()">
          @if (loading()) {
            <span class="btn-submit__spinner"></span>
            Ingresando...
          } @else {
            Ingresar
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          }
        </button>

      </form>

      <p class="auth-switch">
        ¿No tenés cuenta?
        <a (click)="goToRegister()" class="auth-switch__link">Creá una gratis</a>
      </p>

    </div>
  </div>

</div>
