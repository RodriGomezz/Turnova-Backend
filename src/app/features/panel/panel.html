<div class="panel-layout" [class.sidebar-collapsed]="!sidebarOpen()">

  <!-- OVERLAY (mobile) -->
  <div class="sidebar-overlay" [class.sidebar-overlay--visible]="mobileSidebarOpen()" (click)="closeMobileSidebar()" aria-hidden="true"></div>

  <aside class="sidebar" [class.sidebar--mobile-open]="mobileSidebarOpen()">
    <div class="sidebar__header">
      <a routerLink="/" class="sidebar__logo">
        <span class="sidebar__logo-icon">T</span>
        @if (showLabels()) {
          <span class="sidebar__logo-word">turnio</span>
        }
      </a>
      <!-- Botón colapsar (desktop) -->
      <button type="button" class="sidebar__toggle sidebar__toggle--desktop" aria-label="Colapsar menú" (click)="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          @if (sidebarOpen()) {
            <polyline points="15 18 9 12 15 6"/>
          } @else {
            <polyline points="9 18 15 12 9 6"/>
          }
        </svg>
      </button>
      <!-- Botón cerrar (mobile) -->
      <button type="button" class="sidebar__toggle sidebar__toggle--mobile" aria-label="Cerrar menú" (click)="closeMobileSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    @if (hasMultipleBusinesses()) {
      <div class="sidebar__switcher">
        @for (biz of availableBusinesses(); track biz.id) {
          <button
            type="button"
            class="sidebar__branch-item"
            [class.sidebar__branch-item--active]="biz.id === currentBusiness()?.business_id"
            [attr.aria-label]="'Cambiar a ' + biz.nombre"
            (click)="switchBusiness(biz.id)">
            <div class="sidebar__branch-avatar">
              @if (biz.logo_url) {
                <img [src]="biz.logo_url" [alt]="biz.nombre" />
              } @else {
                {{ biz.nombre.charAt(0).toUpperCase() }}
              }
            </div>
            @if (showLabels()) {
              <div class="sidebar__branch-info">
                <span class="sidebar__branch-nombre">{{ biz.nombre }}</span>
                <span class="sidebar__branch-slug">{{ biz.slug }}.turnio.pro</span>
              </div>
              @if (biz.id === currentBusiness()?.business_id) {
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              }
            }
          </button>
        }
      </div>
    }

    <nav class="sidebar__nav">
      @for (item of navItems(); track item.path) {
        <a class="sidebar__item"
          [routerLink]="item.path"
          routerLinkActive="sidebar__item--active"
          [attr.aria-label]="!showLabels() ? item.label : null"
          [title]="!showLabels() ? item.label : ''"
          (click)="closeMobileSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            class="sidebar__item-svg" aria-hidden="true">
            <path [attr.d]="item.svgPath"/>
          </svg>
          @if (showLabels()) {
            <span class="sidebar__item-label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button type="button" class="sidebar__logout" aria-label="Cerrar sesión" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"/>
        </svg>
        @if (showLabels()) {
          <span>Salir</span>
        }
      </button>
    </div>
  </aside>

  <main class="panel-main">
    <!-- Topbar mobile -->
    <div class="mobile-topbar">
      <button type="button" class="mobile-topbar__hamburger" aria-label="Abrir menú" (click)="openMobileSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <a routerLink="/" class="mobile-topbar__logo">
        <span class="mobile-topbar__logo-icon">T</span>
        <span class="mobile-topbar__logo-word">turnio</span>
      </a>
      <!-- Spacer para centrar el logo -->
      <div style="width: 40px;"></div>
    </div>

    <!-- Banner de plan -->
    <app-plan-banner />
    <router-outlet />
  </main>

  <app-toast />

</div>
